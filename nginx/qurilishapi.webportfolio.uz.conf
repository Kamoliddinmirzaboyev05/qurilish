# BuildScience API — host nginx konfiguratsiyasi
# Joylashuv (serverda): /etc/nginx/sites-available/qurilishapi.webportfolio.uz
# SSL sertifikatni certbot --nginx o'zi qo'shadi.

upstream buildscience_api {
    server 127.0.0.1:4001;
    keepalive 32;
}

server {
    listen 80;
    server_name qurilishapi.webportfolio.uz;

    client_max_body_size 12m;

    # JSON javoblarni siqish — trafik va server yuki kamayadi
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1024;
    gzip_comp_level 5;

    location / {
        proxy_pass http://buildscience_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
